name: Angular CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v2
    
      - name: Install Node
        uses: actions/setup-node@v2
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm install

      - name: Angular Build
        run: npm run build